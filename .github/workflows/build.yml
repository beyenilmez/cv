name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-latex-recommended texlive-fonts-recommended texlive-lang-european latexmk lmodern

      - name: Build English CV
        run: latexmk -pdf src/cv-en.tex

      - name: Build Turkish CV
        run: latexmk -pdf src/cv-tr.tex

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/en _site/tr
          mv src/cv-en.pdf _site/en/bedirhan_yenilmez_cv.pdf
          mv src/cv-tr.pdf _site/tr/bedirhan_yenilmez_cv.pdf
          cp public/* _site/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
