name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-latex-recommended texlive-fonts-recommended texlive-lang-european latexmk lmodern

      - name: Build English CV
        run: latexmk -pdf -output-directory=src src/cv-en.tex

      - name: Build Turkish CV
        run: latexmk -pdf -output-directory=src src/cv-tr.tex

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/en _site/tr
          mv src/cv-en.pdf _site/en/bedirhan_yenilmez_cv.pdf
          mv src/cv-tr.pdf _site/tr/bedirhan_yenilmez_cv.pdf
          cp public/* _site/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy _site --project-name cv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
