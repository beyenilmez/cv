name: Build Private CV

on:
  workflow_dispatch:

jobs:
  build-private:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-extra texlive-latex-recommended texlive-fonts-recommended texlive-lang-european latexmk lmodern

      - name: Build private English CV
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: |
          python3 -c "
          import os
          p = os.environ['PHONE_NUMBER']
          with open('src/cv-en.tex') as f:
              t = f.read()
          t = t.replace('%PHONE%', r'\href{tel:' + p + r'}{\underline{' + p + r'}} $|$ ')
          with open('/tmp/cv.tex', 'w') as f:
              f.write(t)
          "
          latexmk -pdf -output-directory=/tmp /tmp/cv.tex
          mkdir -p private-output/en
          mv /tmp/cv.pdf private-output/en/bedirhan_yenilmez_cv.pdf

      - name: Build private Turkish CV
        env:
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: |
          python3 -c "
          import os
          p = os.environ['PHONE_NUMBER']
          with open('src/cv-tr.tex') as f:
              t = f.read()
          t = t.replace('%PHONE%', r'\href{tel:' + p + r'}{\underline{' + p + r'}} $|$ ')
          with open('/tmp/cv.tex', 'w') as f:
              f.write(t)
          "
          latexmk -pdf -output-directory=/tmp /tmp/cv.tex
          mkdir -p private-output/tr
          mv /tmp/cv.pdf private-output/tr/bedirhan_yenilmez_cv.pdf

      - name: Upload private CVs
        uses: actions/upload-artifact@v7
        with:
          name: private-cvs
          path: private-output/
          retention-days: 30
